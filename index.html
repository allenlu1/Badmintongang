<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Badminton Gang</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --green:#1a6b3c;--green-l:#e6f4ec;--green-m:#2d8a52;
  --amber:#92400e;--amber-l:#fef3c7;
  --red:#991b1b;--red-l:#fee2e2;
  --blue:#1e40af;--blue-l:#dbeafe;
  --purple:#5b21b6;--purple-l:#ede9fe;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;
  --g800:#1f2937;--g900:#111827;
  --r:10px;--rl:14px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--g50);color:var(--g800);min-height:100vh;padding-bottom:4rem}
.app-header{background:var(--green);color:white;padding:1rem 1.25rem .875rem;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.app-header h1{font-size:16px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.hrow{display:flex;align-items:center;justify-content:space-between}
.hsub{font-size:12px;opacity:.75;margin-top:2px}
.hbadge{font-size:11px;background:rgba(255,255,255,.2);padding:3px 9px;border-radius:99px;display:flex;align-items:center;gap:4px;font-weight:500}
.container{max-width:520px;margin:0 auto;padding:1rem 1rem 0}
.btn{font-family:var(--font);font-size:13px;padding:5px 12px;border-radius:7px;border:1px solid var(--g200);background:white;color:var(--g700);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:background .1s,border-color .1s}
.btn:hover{background:var(--g50);border-color:var(--g300)}
.btn:active{transform:scale(.98)}
.btn-green{border-color:#a7d7ba;color:var(--green);background:var(--green-l)}
.btn-green:hover{background:#d1ead9}
.btn-red{border-color:#fca5a5;color:var(--red);background:var(--red-l)}
.btn-red:hover{background:#fecaca}
.btn-purple{border-color:#c4b5fd;color:var(--purple);background:var(--purple-l)}
.btn-purple:hover{background:#ddd6fe}
.btn-solid{background:var(--green);color:white;border-color:var(--green);font-weight:500}
.btn-solid:hover{background:var(--green-m)}
.btn-sm{font-size:11px;padding:3px 8px}
.btn-full{width:100%;justify-content:center;margin-top:6px}
.tabs{display:flex;gap:4px;margin-bottom:1rem}
.tab{font-family:var(--font);font-size:13px;padding:5px 14px;border-radius:99px;border:1px solid var(--g200);background:white;color:var(--g500);cursor:pointer;transition:all .15s}
.tab.active{background:var(--g800);color:white;border-color:var(--g800);font-weight:500}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
.stat{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:10px 12px}
.stat-lbl{font-size:10px;color:var(--g500);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:20px;font-weight:600;color:var(--g800);line-height:1}
.ubar{background:white;border:1px solid var(--g200);border-radius:var(--rl);padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ubar label{font-size:13px;color:var(--g500);white-space:nowrap}
.ubar input{flex:1;min-width:120px;font-family:var(--font);font-size:13px;padding:5px 9px;border:1px solid var(--g200);border-radius:7px;background:var(--g50);color:var(--g800);outline:none}
.ubar input:focus{border-color:var(--green-m);background:white}
.scard{background:white;border:1px solid var(--g200);border-radius:var(--rl);margin-bottom:10px;overflow:hidden}
.scard:hover{border-color:var(--g300)}
.shead{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px;user-select:none;-webkit-tap-highlight-color:transparent}
.shead:active{background:var(--g50)}
.sinfo{flex:1;min-width:0}
.sdate{font-size:14px;font-weight:600;color:var(--g800)}
.smeta{font-size:12px;color:var(--g500);margin-top:2px;line-height:1.5}
.smeta .gc{color:var(--green);font-weight:600}
.sright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.pg{background:var(--green-l);color:var(--green)}
.pa{background:var(--amber-l);color:var(--amber)}
.pr{background:var(--red-l);color:var(--red)}
.pp{background:var(--purple-l);color:var(--purple)}
.chevron{width:16px;height:16px;color:var(--g400);transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.sbody{border-top:1px solid var(--g100);padding:12px 14px;display:none}
.sbody.open{display:block}
.slabel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--g400);margin-bottom:6px}
.alist{margin-bottom:10px}
.arow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--g100)}
.arow:last-child{border-bottom:none}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;font-family:var(--mono)}
.av-a{background:var(--blue-l);color:var(--blue)}
.av-w{background:var(--g100);color:var(--g400)}
.av-p{background:#dcfce7;color:#15803d}
.aname{font-size:13px;flex:1;color:var(--g800)}
.aname.wd{text-decoration:line-through;color:var(--g400)}
.wtag{font-size:10px;background:var(--red-l);color:var(--red);padding:2px 6px;border-radius:4px;white-space:nowrap}
.paid-tag{font-size:10px;background:#dcfce7;color:#15803d;padding:2px 6px;border-radius:4px;white-space:nowrap;display:flex;align-items:center;gap:3px}
.cost-box{background:var(--green-l);border:1px solid #a7d7ba;border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.cost-main{font-size:24px;font-weight:700;color:var(--green);font-family:var(--mono)}
.cost-detail{font-size:12px;color:var(--green);opacity:.8;margin-top:2px}
.cost-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.cb-item{background:rgba(255,255,255,.6);border-radius:6px;padding:7px 9px}
.cb-label{font-size:10px;color:var(--green);opacity:.7;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.cb-val{font-size:13px;font-weight:600;color:var(--green)}
.notice{font-size:11px;color:var(--g400);margin-top:8px;padding:6px 10px;background:var(--g50);border-left:2px solid var(--amber-l);border-radius:0 6px 6px 0}
.view{display:none}
.view.active{display:block}
.bbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.bbar h2{font-size:16px;font-weight:600}
.fcard{background:white;border:1px solid var(--g200);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.fg{margin-bottom:10px}
.fg:last-child{margin-bottom:0}
.flabel{font-size:12px;font-weight:500;color:var(--g500);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.04em}
.finput{width:100%;font-family:var(--font);font-size:13px;padding:7px 10px;border:1px solid var(--g200);border-radius:7px;background:var(--g50);color:var(--g800);outline:none}
.finput:focus{border-color:var(--green-m);background:white;box-shadow:0 0 0 2px rgba(45,138,82,.1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.overlay{background:rgba(0,0,0,.4);border-radius:var(--rl);padding:2rem 1rem;display:flex;align-items:center;justify-content:center;min-height:280px}
.modal{background:white;border-radius:var(--rl);border:1px solid var(--g200);padding:1.25rem;width:100%;max-width:300px}
.modal h3{font-size:15px;font-weight:600;margin-bottom:8px}
.modal p{font-size:13px;color:var(--g500);margin-bottom:12px;line-height:1.5}
.pin-row{display:flex;gap:8px;margin-bottom:8px}
.pin-inp{flex:1;font-family:var(--mono);font-size:16px;padding:7px 10px;border:1px solid var(--g200);border-radius:7px;background:var(--g50);color:var(--g800);outline:none;letter-spacing:.1em}
.pin-inp:focus{border-color:var(--green-m);background:white}
.pin-err{font-size:12px;color:var(--red);min-height:18px}
.dzone{border:1px solid #fca5a5;border-radius:var(--r);padding:12px 14px;margin-top:4px}
.dzone .slabel{color:#f87171}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--g400);font-size:13px}
.sharebar{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:1rem;overflow:hidden}
.shareurl{font-size:11px;font-family:var(--mono);color:var(--g500);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.syncbar{background:var(--blue-l);border:1px solid #bfdbfe;border-radius:var(--r);padding:7px 12px;margin-bottom:1rem;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:6px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0}
.sdot.live{background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--g800);color:white;font-size:13px;padding:8px 16px;border-radius:99px;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.reg-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.chip{font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid var(--g200);background:var(--g50);color:var(--g600);cursor:pointer;user-select:none;transition:all .15s}
.chip.on{background:var(--green-l);border-color:#a7d7ba;color:var(--green);font-weight:500}
.section-divider{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--g400);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.section-divider::after{content:'';flex:1;height:1px;background:var(--g200)}
.past-pill{font-size:10px;background:var(--g100);color:var(--g500);padding:2px 6px;border-radius:99px;font-weight:500}
.shuttle-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.shuttle-row input{width:70px}
svg.icon{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:inline-block;vertical-align:-2px;flex-shrink:0}
@media(max-width:400px){.frow{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="app-header">
  <div class="hrow">
    <h1>
      <svg class="icon" style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="17" cy="7" rx="5" ry="5" transform="rotate(-45 17 7)"/><circle cx="17" cy="7" r="2" /><line x1="13.5" y1="10.5" x2="3" y2="21"/></svg>
      Badminton Gang
    </h1>
    <div id="host-badge" style="display:none" class="hbadge">
      <svg class="icon" style="width:12px;height:12px" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Host
    </div>
  </div>
  <div class="hsub">Wednesday 8–10 PM · Court 1 &amp; 2 · NBC Granville</div>
</div>

<div class="container">

  <!-- MAIN VIEW -->
  <div id="view-main" class="view active">
    <div style="margin-top:1rem"></div>
    <div class="syncbar">
      <div class="sdot" id="sdot"></div>
      <span id="sstatus">Connecting...</span>
    </div>
    <div class="sharebar">
      <svg class="icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="shareurl" id="shareurl"></span>
      <button class="btn btn-sm" onclick="copyLink()">Copy link</button>
    </div>
    <div class="ubar">
      <label for="uname">Your name</label>
      <input type="text" id="uname" placeholder="e.g. Allen" autocomplete="name" onkeydown="if(event.key==='Enter')saveName()" />
      <button class="btn btn-green" onclick="saveName()">Save</button>
      <div style="flex-basis:100%;height:0"></div>
      <div style="font-size:11px;color:var(--g400);width:100%">Type your name and press <strong>Save</strong> to join sessions.</div>
      <div style="flex:1"></div>
      <div id="hcbar" style="display:none;gap:6px;align-items:center">
        <button class="btn btn-purple btn-sm" onclick="showView('add-session')">
          <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add session
        </button>
        <button class="btn btn-sm" onclick="showView('players')" style="color:var(--g500)">
          <svg class="icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Players
        </button>
        <button class="btn btn-sm" onclick="showView('history')" style="color:var(--g500)">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          History
        </button>
        <button class="btn btn-sm" style="color:var(--g400)" onclick="logoutHost()">Exit host</button>
      </div>
      <button id="hlbtn" class="btn btn-purple btn-sm" onclick="showView('pin')">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Host login
      </button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-lbl">Sessions</div><div class="stat-val" id="st-s">—</div></div>
      <div class="stat"><div class="stat-lbl" id="st-ml">My confirmed</div><div class="stat-val" id="st-m">—</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setFilter('upcoming',this)">Upcoming</button>
      <button class="tab" onclick="setFilter('mine',this)">My sessions</button>
      <button class="tab" onclick="setFilter('all',this)">All</button>
    </div>
    <div id="session-list"><div class="empty">Loading...</div></div>
  </div>

  <!-- PIN VIEW -->
  <div id="view-pin" class="view">
    <div style="margin-top:1rem"></div>
    <div class="overlay">
      <div class="modal">
        <h3><svg class="icon" style="width:16px;height:16px;margin-right:4px" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Host access</h3>
        <p>Enter the host PIN to unlock admin controls.</p>
        <div class="pin-row">
          <input type="password" class="pin-inp" id="pin-inp" placeholder="PIN" onkeydown="if(event.key==='Enter')checkPin()" />
          <button class="btn btn-solid" onclick="checkPin()">Unlock</button>
        </div>
        <div class="pin-err" id="pin-err"></div>
        <button class="btn btn-sm" style="margin-top:8px;color:var(--g400)" onclick="showView('main')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ADD SESSION VIEW -->
  <div id="view-add-session" class="view">
    <div style="margin-top:1rem"></div>
    <div class="bbar">
      <button class="btn" onclick="showView('main')"><svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back</button>
      <h2>Add session</h2>
    </div>
    <div class="fcard">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div class="fg" style="flex:1;min-width:130px">
          <label class="flabel">Date</label>
          <input class="finput" type="date" id="ns-date" lang="en-AU" />
        </div>
        <div class="fg" style="flex:1;min-width:160px">
          <label class="flabel">Time</label>
          <div style="display:flex;align-items:center;gap:4px">
            <input class="finput" id="ns-time-start" placeholder="8" style="width:44px;text-align:center" value="8" />
            <span style="font-size:13px;color:var(--g500)">–</span>
            <input class="finput" id="ns-time-end" placeholder="10" style="width:44px;text-align:center" value="10" />
            <select class="finput" id="ns-time-ampm" style="width:60px;padding-left:4px">
              <option value="PM" selected>PM</option>
              <option value="AM">AM</option>
            </select>
          </div>
        </div>
      </div>
      <div class="fg">
        <label class="flabel">Venue</label>
        <input class="finput" id="ns-venue" value="NBC Granville" />
      </div>
      <div class="fg">
        <label class="flabel">Courts</label>
        <input class="finput" id="ns-courts" value="Court 1 &amp; 2" />
      </div>
      <div class="fg">
        <label class="flabel">Max players</label>
        <input class="finput" id="ns-max" type="number" value="16" min="1" max="40" style="width:100px" />
      </div>
      <div class="fg">
        <label class="flabel">Default players (tap to toggle)</label>
        <div class="reg-chips" id="ns-chips"></div>
      </div>
      <button class="btn btn-solid btn-full" onclick="addSession()">Add session</button>
    </div>
  </div>

  <!-- EDIT SESSION VIEW -->
  <div id="view-edit-session" class="view">
    <div style="margin-top:1rem"></div>
    <div class="bbar">
      <button class="btn" onclick="showView('main')"><svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back</button>
      <h2 id="edit-title">Edit session</h2>
    </div>
    <div id="edit-form-wrap"></div>
  </div>

  <!-- HISTORY VIEW (host only) -->
  <div id="view-history" class="view">
    <div style="margin-top:1rem"></div>
    <div class="bbar">
      <button class="btn" onclick="showView('main')"><svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back</button>
      <h2>Session history</h2>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- PLAYERS VIEW (host only) -->
  <div id="view-players" class="view">
    <div style="margin-top:1rem"></div>
    <div class="bbar">
      <button class="btn" onclick="showView('main')"><svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back</button>
      <h2>Players</h2>
    </div>
    <div id="players-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDynIxEoKxBQIo9H5nv1dW7YZIlMg-UsHw",
  authDomain: "nbc-badminton.firebaseapp.com",
  databaseURL: "https://nbc-badminton-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nbc-badminton",
  storageBucket: "nbc-badminton.firebasestorage.app",
  messagingSenderId: "486443526587",
  appId: "1:486443526587:web:0c1670c46083bf9afdbc9e"
};

const fbapp = initializeApp(firebaseConfig);
const db = getDatabase(fbapp);

const PIN = 'smash2026';
const UKEY = 'nbc_user_v2';
let REGULARS = ['Jason','Vivian','Andy','Raymond','Cindy','Allen','Ken','Vince','Jimmy','Astrid'];
const COURT_FEE = 136;

let sessions = [];
let user = { name:'', isHost:false };
let filter = 'upcoming';
let openCards = {};
let editId = null;
let dbReady = false;
// selected regulars for new session
let nsSelected = new Set(REGULARS);

// ── utils ─────────────────────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const escA = s => String(s||'').replace(/'/g,"\\'");
const ini = n => String(n).trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
const fmtD = () => new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short'});
const fmtDT = () => new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'});
const dbKey = n => String(n).toLowerCase().replace(/[.#$\[\]\s]/g,'_');
// Find the actual key used in a session's attendees object, case-insensitive
function findAttKey(attendees, name) {
  const lower = name.toLowerCase();
  return Object.keys(attendees||{}).find(k => k.toLowerCase() === lower) || dbKey(name);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}
function loadUser() {
  try { const r=localStorage.getItem(UKEY); return r?JSON.parse(r):{name:'',isHost:false}; } catch { return {name:'',isHost:false}; }
}
function saveUser() { try { localStorage.setItem(UKEY,JSON.stringify(user)); } catch {} }

// Format date string from ISO (yyyy-mm-dd) to display
function fmtDateDisplay(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}

function isPast(iso, time) {
  if (!iso) return false;
  // Parse end time from time string e.g. "8:00–10:00 PM" → 22:00
  let endHour = 23, endMin = 59;
  if (time) {
    const m = time.match(/[–\-]\s*(\d+)(?::(\d+))?\s*(AM|PM)/i);
    if (m) {
      endHour = parseInt(m[1]);
      endMin = m[2] ? parseInt(m[2]) : 0;
      if (m[3].toUpperCase()==='PM' && endHour !== 12) endHour += 12;
      if (m[3].toUpperCase()==='AM' && endHour === 12) endHour = 0;
    }
  }
  const cutoff = new Date(iso + 'T' + String(endHour).padStart(2,'0') + ':' + String(endMin).padStart(2,'0') + ':00');
  return cutoff < new Date();
}

function isThisWeek(iso) {
  if (!iso) return false;
  const d = new Date(iso + 'T00:00:00');
  const now = new Date();
  const start = new Date(now); start.setDate(now.getDate() - now.getDay());
  const end = new Date(start); end.setDate(start.getDate() + 7);
  return d >= start && d < end;
}

// ── default sessions ──────────────────────────────────────────────────────────
function getDefaultSessions() {
  // Next 8 Wednesdays from today
  const sessions = [];
  const d = new Date();
  // find next Wednesday
  const day = d.getDay();
  const daysUntilWed = (3 - day + 7) % 7 || 7;
  d.setDate(d.getDate() + daysUntilWed);
  for (let i = 0; i < 8; i++) {
    const iso = d.toISOString().split('T')[0];
    const id = 'wed_' + iso.replace(/-/g,'');
    const att = {};
    REGULARS.forEach(n => { att[dbKey(n)] = {name:n,joinedAt:'default',withdrawn:false,withdrawnAt:null,paid:false}; });
    sessions.push({ id, dateISO: iso, time:'8:00–10:00 PM', venue:'NBC Granville', courts:'Court 1 & 2', maxPlayers:16, courtFee:COURT_FEE, shuttlesUsed:null, shuttleTotalCost:null, attendees:att });
    d.setDate(d.getDate() + 7);
  }
  return sessions;
}

// ── Firebase ──────────────────────────────────────────────────────────────────
function initDB() {
  // Load regulars from DB (falls back to hardcoded list if not set yet)
  onValue(ref(db,'regulars'), snap => {
    const data = snap.val();
    if (Array.isArray(data) && data.length > 0) {
      REGULARS = data;
    } else {
      // Seed the default list into DB on first run
      set(ref(db,'regulars'), REGULARS);
    }
  });

  onValue(ref(db,'sessions'), snap => {
    const data = snap.val();
    if (!data) {
      const defaults = getDefaultSessions();
      const obj = {};
      defaults.forEach(s => { obj[s.id] = s; });
      set(ref(db,'sessions'), obj);
      return;
    }
    sessions = Object.values(data).sort((a,b)=>String(a.dateISO||'').localeCompare(String(b.dateISO||'')));
    sessions.forEach(s=>{ if(!s.attendees) s.attendees={}; });
    if (!dbReady) {
      dbReady = true;
      document.getElementById('sdot').classList.add('live');
      document.getElementById('sstatus').textContent = 'Live — everyone sees changes instantly';
    }
    renderMain();
    if (document.getElementById('view-history').classList.contains('active')) renderHistory();
    if (document.getElementById('view-edit-session').classList.contains('active')) renderEditForm();
  }, ()=>{
    document.getElementById('sstatus').textContent = 'Connection error';
  });
}

// ── views ─────────────────────────────────────────────────────────────────────
window.showView = function(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  if (id==='main') renderMain();
  if (id==='edit-session') renderEditForm();
  if (id==='history') renderHistory();
  if (id==='add-session') renderAddForm();
  if (id==='players') renderPlayers();
  window.scrollTo(0,0);
};

// ── main render ───────────────────────────────────────────────────────────────
function renderMain() {
  document.getElementById('shareurl').textContent = 'https://bit.ly/4ee9dku';
  document.getElementById('uname').value = user.name;

  const isHost = user.isHost;
  document.getElementById('host-badge').style.display = isHost?'flex':'none';
  document.getElementById('hcbar').style.display = isHost?'flex':'none';
  document.getElementById('hlbtn').style.display = isHost?'none':'inline-flex';

  const upcoming = sessions.filter(s=>!isPast(s.dateISO, s.time));
  const thisWeek = upcoming.filter(s=>isThisWeek(s.dateISO));
  const twCount = thisWeek.length>0 ? Object.values(thisWeek[0].attendees||{}).filter(a=>!a.withdrawn).length : 0;
  const mine = user.name ? sessions.filter(s=>Object.values(s.attendees||{}).some(a=>a.name.toLowerCase()===user.name.toLowerCase()&&!a.withdrawn)).length : 0;

  document.getElementById('st-s').textContent = upcoming.length;
  document.getElementById('st-m').textContent = user.name ? mine : sessions.reduce((a,s)=>a+Object.values(s.attendees||{}).filter(x=>!x.withdrawn).length,0);
  document.getElementById('st-ml').textContent = user.name ? 'My confirmed' : 'Total RSVPs';

  let list;
  if (filter==='upcoming') list = upcoming;
  else if (filter==='mine' && user.name) list = sessions.filter(s=>Object.values(s.attendees||{}).some(a=>a.name.toLowerCase()===user.name.toLowerCase()));
  else list = sessions;

  const upcomingList = list.filter(s=>!isPast(s.dateISO, s.time));
  const pastList = list.filter(s=>isPast(s.dateISO, s.time));

  const container = document.getElementById('session-list');
  if (upcomingList.length===0 && (filter!=='all' || pastList.length===0)) {
    container.innerHTML = `<div class="empty">${filter==='mine'?"You haven't joined any sessions yet.":'No upcoming sessions.'}</div>`;
    if (isHost && filter==='all' && pastList.length===0) return;
    if (!isHost || filter!=='all') return;
  }

  let html = upcomingList.map(s=>renderCard(s,false)).join('');
  if (isHost && pastList.length>0 && filter==='all') {
    html += `<div class="section-divider">Past sessions</div>` + pastList.slice().reverse().map(s=>renderCard(s,true)).join('');
  }
  container.innerHTML = html || `<div class="empty">No sessions found.</div>`;
}

  // cost calculation
  const courtFee = s.courtFee||COURT_FEE;
  const shuttles = s.shuttlesUsed != null ? s.shuttlesUsed : null;
  const shuttleCost = s.shuttleTotalCost != null ? s.shuttleTotalCost : null;
  const totalCost = shuttleCost != null ? courtFee + shuttleCost : null;
  const perHead = totalCost != null && active.length > 0 ? totalCost / active.length : null;

  const pillClass = past?'pp':isFull?'pr':active.length>=max*.7?'pa':'pg';
  const pillText = past?'Past':(isFull?'Full':`${active.length}/${max}`);
  const costInline = perHead!=null ? `<span class="gc"> · $${perHead.toFixed(2)}/person</span>` : '';

  const activeRows = active.map(a=>{
    const isPaid = a.paid;
    return `<div class="arow">

      <span class="aname">${esc(a.name)}</span>
      ${isPaid ? `<span class="paid-tag"><svg class="icon" style="width:10px;height:10px" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Paid</span>` : ''}
      ${!past && a.name.toLowerCase()===user.name.toLowerCase() ? `<button class="btn btn-red btn-sm" onclick="window.withdraw('${s.id}')">Withdraw</button>` : ''}
      ${user.isHost && a.name.toLowerCase()!==user.name.toLowerCase() ? `<button class="btn btn-sm" style="color:var(--g400);font-size:10px" onclick="window.hostRemove('${s.id}','${escA(a.name)}')">Remove</button>` : ''}
    </div>`;
  }).join('');

  const wdRows = withdrawn.map(a=>`
    <div class="arow">
      <div class="av av-w">${ini(a.name)}</div>
      <span class="aname wd">${esc(a.name)}</span>
      <span class="wtag">${esc(a.withdrawnAt||'withdrew')}</span>
    </div>`).join('');

  let costBox = '';
  if (totalCost != null && active.length > 0) {
    costBox = `<div class="cost-box">
      <div style="font-size:12px;color:var(--green);opacity:.8;margin-bottom:4px">Cost breakdown</div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--green)">
          <span>Court fee</span><span>$${courtFee.toFixed(2)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--green)">
          <span>Shuttlecocks${shuttles!=null?' ('+shuttles+'x)':''}</span><span>$${shuttleCost.toFixed(2)}</span>
        </div>
        <div style="height:1px;background:rgba(26,107,60,.2);margin:2px 0"></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--green);font-weight:600">
          <span>Total</span><span>$${totalCost.toFixed(2)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--green);opacity:.7">
          <span>÷ ${active.length} players</span><span></span>
        </div>
      </div>
      <div style="font-size:12px;color:var(--green);opacity:.8;margin-bottom:2px">Each person pays</div>
      <div class="cost-main">$${perHead.toFixed(2)}</div>
    </div>`;
  }

  let actionArea = '';
  if (!past) {
    if (!user.name) actionArea = `<div style="font-size:12px;color:var(--g400)">Enter your name above to join.</div>`;
    else if (myEntry&&!myEntry.withdrawn) actionArea = `<div class="status-msg" style="font-size:12px;color:var(--green);font-weight:500">✓ You're confirmed</div>`;
    else if (myEntry&&myEntry.withdrawn) actionArea = `<div style="display:flex;flex-direction:column;gap:6px">
      <div style="font-size:12px;color:var(--red)">You previously withdrew from this session.</div>
      <button class="btn btn-green" onclick="window.joinSession('${s.id}')">
        <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

    else if (isFull) actionArea = `<div style="font-size:12px;color:var(--amber)">Session is full.</div>`;
    else actionArea = `<button class="btn btn-green" onclick="window.joinSession('${s.id}')">
      <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Join this session</button>`;
  }

  return `<div class="scard">
    <div class="shead" onclick="window.toggleCard('${s.id}')">
      <div class="sinfo">
        <div class="sdate">${esc(fmtDateDisplay(s.dateISO))} · ${esc(s.time)}</div>

      ${!past?`<div class="notice">Withdrawals are visible to everyone. Courts are pre-booked!</div>`:''}
    </div>
  </div>`;
}

// ── add session form ──────────────────────────────────────────────────────────
function renderAddForm() {
  // Set default date to next Wednesday
  const d = new Date();
  const daysUntilWed = (3 - d.getDay() + 7) % 7 || 7;
  d.setDate(d.getDate() + daysUntilWed);
  document.getElementById('ns-date').value = d.toISOString().split('T')[0];

  // Render chips from live REGULARS
  nsSelected = new Set(REGULARS);
  renderRegularChips();
}

window.toggleChip = function(name) {
  if (nsSelected.has(name)) { nsSelected.delete(name); }
  else { nsSelected.add(name); }
  renderRegularChips();
};

function renderRegularChips() {
  const chips = document.getElementById('ns-chips');
  if (!chips) return;
  chips.innerHTML = REGULARS.map(n => {
    const on = nsSelected.has(n);
    return `<span class="chip ${on?'on':''}" onclick="window.toggleChip('${escA(n)}')">${esc(n)}</span>`;
  }).join('');
}

window.addDefaultPlayer = async function() {
  const inp = document.getElementById('ns-new-player');
  const raw = inp.value.trim();
  if (!raw) return;
  // Snap to canonical casing if already known
  const lower = raw.toLowerCase();
  const exists = REGULARS.find(r => r.toLowerCase() === lower);
  if (exists) { toast(exists + ' is already a default player'); inp.value=''; return; }
  REGULARS.push(raw);
  await set(ref(db,'regulars'), REGULARS);
  nsSelected.add(raw);
  inp.value = '';
  renderRegularChips();
  toast(raw + ' added as default player');
};

window.removeDefaultPlayer = async function(name) {
  REGULARS = REGULARS.filter(r => r !== name);
  await set(ref(db,'regulars'), REGULARS);
  nsSelected.delete(name);
  renderRegularChips();
  toast(name + ' removed from defaults');
};

window.confirmRemoveDefault = function(name) {
  if (!confirm(`Remove ${name} from default players?\n\nThey won't be auto-added to future sessions. Past sessions are unchanged.`)) return;
  window.removeDefaultPlayer(name).then(()=>renderPlayers());
};

window.confirmAddDefault = async function(name) {
  if (!confirm(`Set ${name} as a default player?\n\nThey'll be auto-added to all future sessions.`)) return;
  if (REGULARS.some(r => r.toLowerCase() === name.toLowerCase())) {
    toast(name + ' is already a default player'); return;
  }
  REGULARS.push(name);
  await set(ref(db,'regulars'), REGULARS);
  toast(name + ' is now a default player');
  renderPlayers();
};

window.addSession = async function() {
  const dateISO = document.getElementById('ns-date').value;
  const tsStart = document.getElementById('ns-time-start').value.trim()||'8';
  const tsEnd = document.getElementById('ns-time-end').value.trim()||'10';
  const tsAmpm = document.getElementById('ns-time-ampm').value;
  const time = `${tsStart}:00–${tsEnd}:00 ${tsAmpm}`;
  const venue = document.getElementById('ns-venue').value.trim()||'NBC Granville';
  const courts = document.getElementById('ns-courts').value.trim()||'Court 1 & 2';
  const max = parseInt(document.getElementById('ns-max').value)||16;
  if (!dateISO) { toast('Please select a date'); return; }
  const id = 'ses_' + dateISO.replace(/-/g,'') + '_' + Date.now();
  const att = {};
  nsSelected.forEach(n => { att[dbKey(n)] = {name:n,joinedAt:'default',withdrawn:false,withdrawnAt:null,paid:false}; });
  await set(ref(db,`sessions/${id}`), { id, dateISO, time, venue, courts, maxPlayers:max, courtFee:COURT_FEE, shuttlesUsed:null, shuttleTotalCost:null, attendees:att });
  showView('main');
  toast('Session added!');
};

window.previewCost = function() {

// ── history view ──────────────────────────────────────────────────────────────
function renderHistory() {
  const sixMonthsAgo = new Date(); sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
  const past = sessions.filter(s => {
    if (!isPast(s.dateISO, s.time)) return false;
    return new Date(s.dateISO + 'T00:00:00') >= sixMonthsAgo;
  }).slice().reverse();
  const container = document.getElementById('history-list');
  if (past.length===0) { container.innerHTML='<div class="empty">No past sessions in the last 6 months.</div>'; return; }
  container.innerHTML = past.map(s=>{
    const atts = Object.values(s.attendees||{});
    const active = atts.filter(a=>!a.withdrawn);
    const paid = active.filter(a=>a.paid).length;
    const cf = s.courtFee||COURT_FEE;
    const shuttles = s.shuttlesUsed;
    const sc = s.shuttleTotalCost!=null ? s.shuttleTotalCost : null;
    const total = sc!=null?cf+sc:null;
    const perHead = total!=null&&active.length>0?total/active.length:null;
    return `<div class="fcard" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-size:14px;font-weight:600">${esc(fmtDateDisplay(s.dateISO))}</div>
          <div style="font-size:12px;color:var(--g500);margin-top:2px">${esc(s.venue)} · ${esc(s.courts)}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${perHead!=null?`<span class="pill pg">$${perHead.toFixed(2)}/person</span>`:''}
          <button class="btn btn-purple btn-sm" onclick="window.openEdit('${s.id}');window.showView('edit-session')">Edit</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--g500);margin-bottom:8px">${active.length} players · ${paid}/${active.length} paid${total!=null?' · Total $'+total.toFixed(2):''}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:${total!=null?'10':'0'}px">
        ${active.map(a=>`<span style="font-size:12px;padding:3px 8px;border-radius:99px;background:${a.paid?'#dcfce7':'var(--g100)'};color:${a.paid?'#15803d':'var(--g600)'};">${esc(a.name)}${a.paid?' ✓':''}</span>`).join('')}
      </div>
      ${total!=null&&active.length>0?`<button class="btn btn-green btn-sm" onclick="window.sharePayment('${s.id}')">
        <svg class="icon" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Share payment message
      </button>`:''}
    </div>`;
  }).join('');
}

// ── players view ──────────────────────────────────────────────────────────────
function renderPlayers() {
  const container = document.getElementById('players-list');

  // Build map of players — only count upcoming sessions
  const playerMap = {};
  sessions.filter(s => !isPast(s.dateISO, s.time)).forEach(s => {
    Object.values(s.attendees||{}).forEach(a => {
      if (!a.name) return;
      const key = a.name.toLowerCase();
      if (!playerMap[key]) playerMap[key] = { name: a.name, sessions: 0, withdrawn: 0 };
      if (!a.withdrawn) playerMap[key].sessions++;
      else playerMap[key].withdrawn++;
    });
  });

  // Merge regulars who may not have attended any session yet
  REGULARS.forEach(n => {
    const key = n.toLowerCase();
    if (!playerMap[key]) playerMap[key] = { name: n, sessions: 0, withdrawn: 0 };
  });

  const allPlayers = Object.values(playerMap).sort((a, b) => {
    // Regulars first, then by session count
    const aReg = REGULARS.some(r => r.toLowerCase() === a.name.toLowerCase());
    const bReg = REGULARS.some(r => r.toLowerCase() === b.name.toLowerCase());
    if (aReg !== bReg) return aReg ? -1 : 1;
    return b.sessions - a.sessions;
  });

  if (allPlayers.length === 0) {
    container.innerHTML = '<div class="empty">No players found yet.</div>';
    return;
  }

  const totalRegulars = allPlayers.filter(p => REGULARS.some(r => r.toLowerCase() === p.name.toLowerCase())).length;
  const totalGuests = allPlayers.length - totalRegulars;

  function playerRow(p) {
    const isReg = REGULARS.some(r => r.toLowerCase() === p.name.toLowerCase());
    return `<div class="arow" style="padding:9px 0">
      <div class="av ${isReg?'av-a':'av-w'}">${ini(p.name)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:var(--g800);font-weight:${isReg?'500':'400'}">${esc(p.name)}</div>
        <div style="font-size:11px;color:var(--g400);margin-top:1px">
          ${p.sessions} session${p.sessions!==1?'s':''}${p.withdrawn>0?` · <span style="color:var(--red)">${p.withdrawn} withdrew</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
        ${isReg
          ? `<span class="pill pg" style="font-size:10px">Default</span>
             <button class="btn btn-red btn-sm" onclick="window.confirmRemoveDefault('${escA(p.name)}')">Remove</button>`
          : `<button class="btn btn-sm" style="color:var(--green);border-color:#a7d7ba;background:var(--green-l)" onclick="window.confirmAddDefault('${escA(p.name)}')">+ Set default</button>`
        }
      </div>
    </div>`;
  }

  container.innerHTML = `
    <div class="fcard">
      <div style="font-size:12px;color:var(--g500);margin-bottom:12px">${allPlayers.length} players · ${totalRegulars} defaults · ${totalGuests} guests</div>
      <div class="alist">${allPlayers.map(playerRow).join('')}</div>
    </div>`;
}

// ── actions ───────────────────────────────────────────────────────────────────
window.toggleCard = function(id) { openCards[id]=!openCards[id]; renderMain(); };
window.setFilter = function(f,btn) {
  filter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderMain();
};
window.copyLink = function() {
  navigator.clipboard.writeText('https://bit.ly/4ee9dku').then(()=>toast('Link copied!')).catch(()=>toast('Copy the URL from your browser'));
};
window.saveName = function() {
  let v = document.getElementById('uname').value.trim();
  if (!v) return;
  // Snap to canonical name — check regulars first, then any known attendee
  const lower = v.toLowerCase();
  const canonical = REGULARS.find(r => r.toLowerCase() === lower)
    || (() => {
      for (const s of sessions) {
        for (const a of Object.values(s.attendees||{})) {
          if (a.name && a.name.toLowerCase() === lower) return a.name;
        }
      }
      return null;
    })();
  if (canonical) v = canonical;
  user.name = v;
  document.getElementById('uname').value = v;
  saveUser(); toast('Name saved!'); renderMain();
};
window.checkPin = function() {
  const v=document.getElementById('pin-inp').value;
  if(v===PIN){ user.isHost=true; saveUser(); document.getElementById('pin-inp').value=''; document.getElementById('pin-err').textContent=''; showView('main'); toast('Host access unlocked'); }
  else document.getElementById('pin-err').textContent='Incorrect PIN.';
};
window.logoutHost = function() { user.isHost=false; saveUser(); renderMain(); toast('Exited host mode'); };

window.joinSession = async function(id) {
  if(!user.name)return;
  const s=sessions.find(x=>x.id===id);
  if(!s)return;
  const k=findAttKey(s.attendees, user.name);
  const existing=(s.attendees||{})[k];
  if(existing&&!existing.withdrawn)return;
  // Either new join or rejoining after withdrawal
  await update(ref(db,`sessions/${id}/attendees/${k}`),{name:user.name,joinedAt:fmtD(),withdrawn:false,withdrawnAt:null,paid:false});
  openCards[id]=true; toast("You're in! See you on court 🏸");
};

window.withdraw = async function(id) {
  if(!user.name)return;
  const s=sessions.find(x=>x.id===id);
  const k=findAttKey(s?s.attendees:{}, user.name);
  await update(ref(db,`sessions/${id}/attendees/${k}`),{withdrawn:true,withdrawnAt:'withdrew '+fmtDT()});
  toast('Withdrawal recorded');
};

window.hostRemove = async function(id,name) {
  if(!user.isHost)return;
  const s=sessions.find(x=>x.id===id);
  const k=findAttKey(s?s.attendees:{}, name);
  await update(ref(db,`sessions/${id}/attendees/${k}`),{withdrawn:true,withdrawnAt:'removed by host '+fmtD()});
  toast(name+' removed');
};

window.sharePayment = function(id) {
  const s = sessions.find(x=>x.id===id);
  if (!s) return;
  const atts = Object.values(s.attendees||{});
  const active = atts.filter(a=>!a.withdrawn);
  const cf = s.courtFee||COURT_FEE;

  const msg =
`Badminton Gang
${fmtDateDisplay(s.dateISO)}

Cost breakdown
Court fee:        $${cf.toFixed(2)}
Shuttlecocks${shuttles!=null?' ('+shuttles+'x)':''}:   $${sc.toFixed(2)}
─────────────────
Total:            $${total.toFixed(2)}

Total ${active.length} players and each person pays: $${perHead.toFixed(2)}

BSB: 112-879
Acc: 477398765
Name: I-Wei Lu

Please like the post once you've made the payment. Thx

Registration: https://bit.ly/4ee9dku`;

function showShareModal(msg) {
  const existing = document.getElementById('share-modal-wrap');
  if (existing) existing.remove();

  const wrap = document.createElement('div');
  wrap.id = 'share-modal-wrap';
  wrap.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998;display:flex;align-items:flex-end;justify-content:center;padding:1rem';
  const canShare = !!navigator.share;
  wrap.innerHTML = `
    <div style="background:white;border-radius:var(--rl);padding:1.25rem;width:100%;max-width:520px;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <span style="font-size:14px;font-weight:600">Payment message</span>
          <div style="font-size:11px;color:var(--g400);margin-top:2px">Edit before sending if needed</div>
        </div>
        <button class="btn btn-sm" onclick="document.getElementById('share-modal-wrap').remove()">Close</button>
      </div>
      <textarea id="share-ta" style="font-family:var(--mono);font-size:12px;line-height:1.7;padding:10px;border:1px solid var(--g200);border-radius:7px;height:280px;resize:none;color:var(--g800);background:var(--g50);width:100%">${msg.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</textarea>
      <div style="display:flex;gap:8px">
        ${canShare ? `<button class="btn btn-solid" style="flex:1;justify-content:center" onclick="
          const t=document.getElementById('share-ta').value;
          document.getElementById('share-modal-wrap').remove();
          navigator.share({text:t}).catch(()=>{});
        "><svg class='icon' viewBox='0 0 24 24'><circle cx='18' cy='5' r='3'/><circle cx='6' cy='12' r='3'/><circle cx='18' cy='19' r='3'/><line x1='8.59' y1='13.51' x2='15.42' y2='17.49'/><line x1='15.41' y1='6.51' x2='8.59' y2='10.49'/></svg> Share</button>` : ''}
        <button class="btn ${canShare?'':'btn-solid'}" style="flex:1;justify-content:center" onclick="
          const ta=document.getElementById('share-ta');
          navigator.clipboard.writeText(ta.value).then(()=>{}).catch(()=>{ta.select();document.execCommand('copy');});
          toast('Copied! Paste into WhatsApp or LINE');
          document.getElementById('share-modal-wrap').remove();
        "><svg class='icon' viewBox='0 0 24 24'><rect x='9' y='9' width='13' height='13' rx='2' ry='2'/><path d='M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1'/></svg> Copy all</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
}
